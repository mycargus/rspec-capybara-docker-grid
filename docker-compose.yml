services:
  hub:
    image: selenium/hub:4.41.0
    platform: linux/amd64
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    networks:
      - rspec-capybara-docker-grid-network

  node-chrome:
    image: selenium/node-chrome:4.41.0
    platform: linux/amd64
    environment: &SELENIUM_NODE_ENV
      SE_EVENT_BUS_HOST: hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    ports:
      - "5901:5900"
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - rspec-capybara-docker-grid-network
    depends_on:
      - hub

  node-chrome-debug:
    image: selenium/node-chrome:4.41.0
    platform: linux/amd64
    environment:
      <<: *SELENIUM_NODE_ENV
    ports:
      - "5901:5900"
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - rspec-capybara-docker-grid-network
    depends_on:
      - hub

  node-firefox:
    image: selenium/node-firefox:4.41.0
    platform: linux/amd64
    environment:
      <<: *SELENIUM_NODE_ENV
    ports:
      - "5900:5900"
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - rspec-capybara-docker-grid-network
    depends_on:
      - hub

  node-firefox-debug:
    image: selenium/node-firefox:4.41.0
    platform: linux/amd64
    environment:
      <<: *SELENIUM_NODE_ENV
    ports:
      - "5900:5900"
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - rspec-capybara-docker-grid-network
    depends_on:
      - hub

  testrunner:
    build:
      context: .
    command: ruby grid/testrunner.rb
    environment:
      APP_HOST: web:80
      HUB_HOST: hub:4444
    networks:
      - rspec-capybara-docker-grid-network

  web:
    image: mycargus/hello_docker_world:master
    networks:
      - rspec-capybara-docker-grid-network

networks:
  rspec-capybara-docker-grid-network:
    driver: bridge
    name: rspec-capybara-docker-grid-network
